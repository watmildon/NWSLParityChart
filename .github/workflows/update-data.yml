name: Update NWSL Data

on:
  # Nightly schedule disabled — run manually via workflow_dispatch.
  # schedule:
  #   - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "Season year (default: current year)"
        required: false
        type: string
      dry_run:
        description: "Dry run (no file changes)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run pipeline
        working-directory: pipeline
        run: |
          ARGS=""
          if [ -n "${{ inputs.season }}" ]; then
            ARGS="$ARGS --season ${{ inputs.season }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python main.py $ARGS

      - name: Commit and push if changed
        if: inputs.dry_run != true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update season data from ASA API"
            git push
          fi
