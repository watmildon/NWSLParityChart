<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWSL Circle of Parity</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>NWSL Circle of Parity</h1>
            <div class="season-selector">
                <label for="season">Season:</label>
                <select id="season">
                    <option value="2026">2026</option>
                    <option value="2025" selected>2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                    <option value="2021">2021</option>
                    <option value="2020">2020</option>
                    <option value="2019">2019</option>
                    <option value="2018">2018</option>
                    <option value="2017">2017</option>
                    <option value="2016">2016</option>
                    <option value="2015">2015</option>
                    <option value="2014">2014</option>
                    <option value="2013">2013</option>
                </select>
            </div>
        </div>
    </header>

    <main>
        <div id="visualization-container">
            <svg id="parity-chart" viewBox="0 0 800 800"></svg>
            <div id="tooltip" class="tooltip"></div>
        </div>

        <div id="info-panel">
            <p id="chain-status"></p>
            <div id="missing-teams"></div>
        </div>
    </main>

    <footer>
        <p>Data sourced from <a href="https://fbref.com/en/comps/182/schedule/NWSL-Scores-and-Fixtures">FBref</a></p>
    </footer>

    <script src="js/parity.js"></script>
    <script src="js/visualization.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
